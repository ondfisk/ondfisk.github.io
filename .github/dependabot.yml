---
version: 2
updates:
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    groups:
      devcontainers:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: bundler
    directory: /blog
    schedule:
      interval: weekly
    groups:
      bundler:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
